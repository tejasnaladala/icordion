<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>icordion</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- tap to init audio + motion -->
  <div id="boot" class="boot">
    <pre>
> icordion v1.0
> inspired by my bestfriend's
  mac-cordian

> tap anywhere to start_
    </pre>
  </div>

  <!-- accordion -->
  <div id="app" class="app hidden">
    <div class="header">
      <span class="title">> icordion</span>
      <span id="bellows-pct" class="bpct">0%</span>
    </div>

    <div class="bellows-bar">
      <div id="bfill" class="bfill"></div>
    </div>

    <div class="keys" id="keys"></div>

    <div class="bass" id="bass"></div>

    <div class="accel" id="accel">
      <span>x:<span id="ax">0.00</span> y:<span id="ay">0.00</span> z:<span id="az">0.00</span></span>
      <span>jerk:<span id="aj">0.00</span> p:<span id="ap">0.00</span></span>
    </div>
  </div>

  <script type="module" src="/js/mobile-app.js"></script>
</body>
</html>
